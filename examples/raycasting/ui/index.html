<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ray Casting Engine</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <canvas id="viewCanvas"></canvas>
    <aside id="hud">
        <div class="panel-section stats">
            <p>Position <span id="positionValue">0.00, 0.00</span></p>
            <p>Heading <span id="headingValue">0°</span></p>
            <p>FPS <span id="fpsValue">0</span></p>
        </div>

        <div class="panel-section controls">
            <label>
                View Distance
                <input id="distanceRange" type="range" min="6" max="20" value="12">
                <span id="distanceValue">12</span>
            </label>
            <label>
                Field of View
                <input id="fovRange" type="range" min="45" max="100" value="70">
                <span id="fovValue">70°</span>
            </label>
        </div>

        <div class="panel-section actions">
            <button id="toggleMapBtn" type="button">Hide Mini Map</button>
            <button id="shuffleBtn" type="button">Shuffle Colors</button>
            <button id="resetBtn" type="button">Reset Player</button>
        </div>

        <div class="panel-section help">
            <p>Move <span>W S</span></p>
            <p>Turn <span>A D / ← →</span></p>
            <p>Strafe <span>Q E</span></p>
        </div>
    </aside>

    <script src="app.js"></script>
</body>
</html>
