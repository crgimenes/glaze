<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Doom Fire</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <canvas id="fire"></canvas>
  <div id="hud">
    <span id="wind-label">Wind: 0</span>
    <input type="range" id="wind" min="-5" max="5" value="0">
    <span id="decay-label">Decay: 2</span>
    <input type="range" id="decay" min="1" max="5" value="2">
    <button id="toggle">Extinguish</button>
  </div>
  <script src="app.js"></script>
</body>
</html>
